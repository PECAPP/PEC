services:
  postgres:
    image: postgres:16-alpine
    container_name: pec_postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "pec"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: pec_backend_dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: "pec_secret_key_2026"
      PORT: "3000"
      NODE_ENV: "development"
      CORS_ORIGINS: "http://localhost:3001"
      DB_HOST: "postgres"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/pec"
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
    command: >
      sh -c "
      if [ ! -d node_modules/@nestjs ]; then npm install; fi &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run build &&
      npm run start
      "
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: pec_frontend_dev
    profiles:
      - frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      GITHUB_AI_API_KEY: "${GITHUB_AI_API_KEY:-}"
      VITE_API_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
      - /app/archive
      - /app/server
    command: >
      sh -c "
      if [ ! -d node_modules/next ]; then npm install --legacy-peer-deps; fi &&
      npm run dev -- --turbopack --hostname 0.0.0.0 --port 3001
      "
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  backend_node_modules:
  frontend_node_modules:
