name: Institutional Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Verification Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Institutional Dependencies
        run: npm ci

      - name: Perform Institutional Linting
        run: npm run lint

      - name: Build Platform Artifacts
        run: npm run build
