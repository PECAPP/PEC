name: pec_app
description: PEC Campus ERP — Flutter mobile app for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & Networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^6.0.5

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.7

  # Local Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Authentication
  local_auth: ^2.3.0

  # Media & Camera
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Firebase / Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  intl: ^0.19.0
  flutter_markdown: ^0.7.4

  # Forms
  reactive_forms: ^17.0.0

  # PDF & Export
  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^10.0.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Utilities
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  flutter_dotenv: ^5.2.1
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: MonumentExtended
      fonts:
        - asset: assets/fonts/MonumentExtended-Regular.otf
        - asset: assets/fonts/MonumentExtended-Ultrabold.otf
          weight: 800
